name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Run go mod tidy
        run: go mod tidy

      - name: Check for changes
        run: |
          git diff --exit-code go.mod go.sum || (echo "go.mod or go.sum has changes after 'go mod tidy'. Please run 'go mod tidy' and commit the changes." && exit 1)

      - name: Verify dependencies
        run: go mod verify

      - name: Run go fmt
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            echo "Go code is not formatted. Please run 'go fmt ./...'"
            gofmt -l .
            exit 1
          fi

      - name: Run go vet
        run: go vet ./...

      - name: Build
        run: go build -v ./...
